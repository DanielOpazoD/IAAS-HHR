[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "npm run build"
  publish = "dist"

# Firebase API keys are intentionally public — security is enforced by Firestore Rules.
# This tells Netlify's scanner not to flag the AIza... prefix as a secret.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyC-oaGViqnbqdJHl8pWy4ohkxFMBUj5IZk"

# ── Security headers ──────────────────────────────────────────────────────────
# Applied to every response served by Netlify.
# Critical for a healthcare app handling epidemiological surveillance data.
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent the app from being embedded in iframes (clickjacking protection)
    X-Frame-Options = "DENY"

    # Prevent browsers from MIME-sniffing the content type
    X-Content-Type-Options = "nosniff"

    # Only send the origin as referrer when crossing origins
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable access to sensitive browser features not needed by the app
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # Force HTTPS for 1 year, including subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content Security Policy:
    # - default-src 'self': only load resources from our own origin
    # - script-src 'self' 'unsafe-inline': Vite inlines scripts at build time
    # - style-src 'self' 'unsafe-inline': Tailwind generates inline styles
    # - connect-src: allow Firebase APIs and Netlify functions
    # - img-src 'self' data: blob: https://lh3.googleusercontent.com: Google OAuth avatars
    # - font-src 'self': local fonts only
    # - frame-ancestors 'none': no iframing (redundant with X-Frame-Options, defence in depth)
    # Single line — HTTP headers cannot contain literal newlines
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com wss://*.firebaseio.com; img-src 'self' data: blob: https://lh3.googleusercontent.com; font-src 'self'; frame-ancestors 'none';"

# Cache static assets aggressively (Vite fingerprints filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache HTML (ensures users always get the latest app shell)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
